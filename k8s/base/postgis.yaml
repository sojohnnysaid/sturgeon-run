apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgis-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgis
  labels: { app: postgis }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: postgis }
  template:
    metadata:
      labels: { app: postgis }
    spec:
      containers:
        - name: postgis
          # Multi-arch (amd64 + native arm64) PostGIS 16 / 3.5 — mirrors compose.
          image: ghcr.io/baosystems/postgis:16-3.5
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: sturgeon-config, key: POSTGRES_USER } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: sturgeon-config, key: POSTGRES_DB } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: sturgeon-secrets, key: POSTGRES_PASSWORD } }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sturgeon", "-d", "sturgeon"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sturgeon", "-d", "sturgeon"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgis-data
        - name: initdb
          configMap:
            name: db-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgis
spec:
  selector: { app: postgis }
  ports:
    - port: 5432
      targetPort: 5432
