# Dev-only secret values (local clusters: kind/minikube). These are throwaway
# development credentials, not production secrets. Rotate/replace for any real
# deployment (kubectl create secret, sealed-secrets, external-secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: sturgeon-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-dev"
  DATABASE_URL: "postgres://sturgeon:change-me-in-dev@postgis:5432/sturgeon"
  # Set a dev token so the MCP endpoint is ENABLED in the dev overlay.
  MCP_API_TOKEN: "dev-please-change"
