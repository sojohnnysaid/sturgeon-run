apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
  labels: { app: mcp }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mcp }
  template:
    metadata:
      labels: { app: mcp }
    spec:
      containers:
        - name: mcp
          image: sturgeon-run/mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: MCP_PORT
              valueFrom: { configMapKeyRef: { name: sturgeon-config, key: MCP_PORT } }
            - name: CORRIDOR_API_URL
              valueFrom: { configMapKeyRef: { name: sturgeon-config, key: CORRIDOR_API_URL } }
            - name: MCP_API_TOKEN
              valueFrom: { secretKeyRef: { name: sturgeon-secrets, key: MCP_API_TOKEN } }
          readinessProbe:
            # /mcp returns 503 when the token is unset and 401 without auth; both
            # mean the process is up. A TCP probe avoids coupling to auth state.
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  selector: { app: mcp }
  ports:
    - port: 8081
      targetPort: 8081
