# PLACEHOLDER secret. Base ships empty values so nothing sensitive is committed.
# The dev overlay fills dev values via a secretGenerator; for any real cluster,
# replace these (kubectl create secret / sealed-secrets / external-secrets).
#   DATABASE_URL   — full postgres URL (contains the password)
#   POSTGRES_PASSWORD — DB superuser password
#   MCP_API_TOKEN  — bearer token; if empty the mcp endpoint is DISABLED (503)
apiVersion: v1
kind: Secret
metadata:
  name: sturgeon-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: ""
  DATABASE_URL: ""
  MCP_API_TOKEN: ""
