# Expose the browser- and agent-facing services on stable NodePorts for local
# dev clusters. corridor-api and tiles are reachable directly for debugging;
# web is the main entrypoint, mcp is the agent endpoint.
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: NodePort
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30573
---
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: corridor-api
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: tiles
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
